{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign In | {{ APP_NAME }}</title>
  <link rel="stylesheet" href="{% static 'admin_portal/styles.css' %}">
</head>
<body>
  <div class="login-page">
    <div class="reef-scene" aria-hidden="true">
      <video class="reef-video" autoplay muted loop playsinline>
        <source src="{% url 'admin_portal:background_video' %}" type="video/mp4">
      </video>
      <div class="reef-overlay reef-overlay-base"></div>
      <div class="reef-overlay reef-overlay-focus"></div>
    </div>
    <div class="login-card">
      <div class="brand-block" style="margin-bottom:20px;">
        <div class="brand-mark">A</div>
        <div>
          <div class="brand-title">{{ APP_NAME }}</div>
          <div class="brand-subtitle">{{ APP_TAGLINE }}</div>
        </div>
      </div>
      <h1>Admin sign in</h1>
      <p class="page-subtitle">Only approved Aqua AI admins can access this control plane.</p>

      {% if messages %}
      <div class="message-stack">
        {% for message in messages %}
        <div class="message {{ message.tags }}">{{ message }}</div>
        {% endfor %}
      </div>
      {% endif %}

      <form method="post" class="login-grid">
        {% csrf_token %}
        <div class="form-group">
          <label for="id_username">Email</label>
          <input id="id_username" type="email" name="username" placeholder="admin@humara.io" required autofocus>
        </div>
        <div class="form-group">
          <label for="id_password">Password</label>
          <input id="id_password" type="password" name="password" placeholder="Password" required>
        </div>
        <button class="btn-primary" type="submit">Sign in</button>
      </form>
    </div>
  </div>
</body>
</html>
