{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign In | {{ APP_NAME }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="{% static 'admin_portal/styles.css' %}">
</head>
<body data-theme="dark">
  <div class="login-page auth-page">
    <div class="reef-scene" aria-hidden="true">
      <video class="reef-video" autoplay muted loop playsinline>
        <source src="{% url 'admin_portal:background_video' %}" type="video/mp4">
      </video>
      <div class="reef-overlay reef-overlay-base"></div>
      <div class="reef-overlay reef-overlay-focus"></div>
    </div>

    <main class="auth-card">
      <div class="auth-head">
        <div class="auth-logo">A</div>
        <div class="auth-brand">
          <div class="auth-brand-title">{{ APP_NAME }}</div>
          <div class="auth-brand-sub">Control Room</div>
        </div>
      </div>

      <div class="auth-title-block">
        <h1>Admin sign in</h1>
        <span class="auth-underline" aria-hidden="true"></span>
      </div>

      {% if messages %}
      <div class="message-stack" style="margin-bottom:18px;">
        {% for message in messages %}
        <div class="message {{ message.tags }}">{{ message }}</div>
        {% endfor %}
      </div>
      {% endif %}

      <form method="post" class="auth-form">
        {% csrf_token %}
        <div class="auth-field">
          <label for="id_username">Work email</label>
          <div class="auth-input-wrap">
            <span class="auth-field-icon" aria-hidden="true">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            </span>
            <input id="id_username" class="auth-input" type="email" name="username" placeholder="admin@aquaai.uk" required autofocus autocomplete="username">
          </div>
        </div>

        <div class="auth-field">
          <label for="id_password">System key</label>
          <div class="auth-input-wrap">
            <span class="auth-field-icon" aria-hidden="true">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
            </span>
            <input id="id_password" class="auth-input" type="password" name="password" placeholder="••••••••••••" required autocomplete="current-password">
            <button class="auth-eye" type="button" id="togglePw" aria-label="Show or hide password">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>

        <button class="auth-submit" type="submit">
          <span>Sign in</span>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 12h14"/><path d="M12 5l7 7-7 7"/></svg>
        </button>
      </form>

      <div class="auth-divider"><span>System integrity</span></div>
      <div class="auth-status">
        <div class="auth-status-item">
          <span class="auth-pip" aria-hidden="true"></span>
          Global core online
        </div>
        <div class="auth-status-item">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="M9 12l2 2 4-4"/></svg>
          Encrypted protocol
        </div>
      </div>
    </main>
  </div>

  <script>
  (function () {
    var btn = document.getElementById("togglePw");
    var pw = document.getElementById("id_password");
    if (btn && pw) {
      btn.addEventListener("click", function () {
        pw.type = pw.type === "password" ? "text" : "password";
        btn.classList.toggle("is-on");
      });
    }
  })();
  </script>
</body>
</html>
