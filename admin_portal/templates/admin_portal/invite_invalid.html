{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Invite Unavailable | {{ APP_NAME }}</title>
  <link rel="stylesheet" href="{% static 'admin_portal/styles.css' %}">
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="brand-block" style="margin-bottom:20px;">
        <div class="brand-mark">A</div>
        <div>
          <div class="brand-title">{{ APP_NAME }}</div>
          <div class="brand-subtitle">{{ APP_TAGLINE }}</div>
        </div>
      </div>
      <h1>Invite unavailable</h1>
      <p class="page-subtitle">This invite has expired, already been used, or has been revoked.</p>
      <a class="btn btn-primary" href="{% url 'admin_portal:login' %}">Return to sign in</a>
    </div>
  </div>
</body>
</html>
