{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Accept Invite | {{ APP_NAME }}</title>
  <link rel="stylesheet" href="{% static 'admin_portal/styles.css' %}">
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="brand-block" style="margin-bottom:20px;">
        <div class="brand-mark">A</div>
        <div>
          <div class="brand-title">{{ APP_NAME }}</div>
          <div class="brand-subtitle">{{ APP_TAGLINE }}</div>
        </div>
      </div>
      <h1>Accept invite</h1>
      <p class="page-subtitle">Set up your admin account for <strong>{{ invite.email }}</strong>. Your assigned role is <strong>{{ invite.role }}</strong>.</p>

      {% if messages %}
      <div class="message-stack">
        {% for message in messages %}
        <div class="message {{ message.tags }}">{{ message }}</div>
        {% endfor %}
      </div>
      {% endif %}

      <form method="post" class="login-grid">
        {% csrf_token %}
        <div class="form-group">
          <label for="id_full_name">Full name</label>
          <input id="id_full_name" type="text" name="full_name" value="{{ invite.full_name }}" placeholder="Optional full name">
        </div>
        <div class="form-group">
          <label for="id_password1">Password</label>
          <input id="id_password1" type="password" name="password1" required minlength="10">
        </div>
        <div class="form-group">
          <label for="id_password2">Confirm password</label>
          <input id="id_password2" type="password" name="password2" required minlength="10">
        </div>
        <button class="btn-primary" type="submit">Activate account</button>
      </form>
    </div>
  </div>
</body>
</html>
